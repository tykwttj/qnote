name: qnote
description: "Quick + Note - A beautiful memo app with color tags"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_slidable: ^3.1.1
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  # Widget
  home_widget: ^0.7.0

  # Ads
  google_mobile_ads: ^5.3.0

  # Sharing
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # App icon
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  generate: true
